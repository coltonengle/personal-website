<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Website</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f5f5f5;
                color: #333;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }

            h1 {
                font-size: 48px;
                margin-bottom: 20px;
            }

            p {
                font-size: 18px;
                margin-bottom: 40px;
            }

            button {
                background-color: #333;
                color: white;
                padding: 12px 24px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>Hello there</h1>
        <p>Welcome to my website.</p>
        <button onclick="alert('Hello!')">Click me</button>
    </body>
</html>
